blueprint:
  name: Smart Adaptive Lighting and Scene Activator (SALSA)
  domain: automation
  author: Nathaniel Pitts
  source_url: https://github.com/npitts5397/ha_custom/blob/main/blueprints/smart_adaptive_lighting_scene_activator.yaml
  homeassistant:
    min_version: 2024.8.0
  description: |
    Set light configuration based on switch and Adaptive Lighting states.

    Requires a standard Home Assistant `event` domain entity with an `event_type` attribute.
    Compatible with any integration that exposes proper HA event entities — including
    Zigbee2MQTT, ZHA, deCONZ, Lutron, and others.

    **Zigbee2MQTT Users**
    Event entities must be explicitly enabled: Settings → Home Assistant Integration →
    "Home Assistant experimental event entities". Without this, no `event.*` action entities
    will appear in HA.

    Z2M's event entity implementation is still being finalized upstream. The `event_type`
    attribute name is subject to change in future Z2M releases. If the blueprint stops
    responding after a Z2M upgrade, verify attribute names in Developer Tools → States.
    Users of other integrations should consult their integration's documentation for
    equivalent guidance.

    Version history:
      * 5.0.0 - #109 - Migrate to event-based triggers; remove MQTT triggers. General refactoring and optimization.
      * 4.0.0 - HA-140 - Lots of refactoring, rework inputs, and squash some outstanding bugs.
      * 3.0.0 - HA-95 - General refactoring, bugfixes, and feature enhancements
      * 2.0.0 - HA-82 - Subscribe to switch MQTT topics instead of relying on HA entity state changes.
      * 1.0.0 - HA-82 - Initial version.

    TO-DO
      - [ ] Remove triggers for phase / home and associated actions. This functionality will continue to
            exist, but it needs to be moved to a separate automation. I think the automation will be a
            consolidated version of the phase update automations. I think using a label for the switches
            that should be updated basedo on the phase will be the best way to do this.
  input:
    events:
      name: Switch Event Configuration
      icon: mdi:lightning-bolt
      description: Devices and action values which trigger the automation.
      collapsed: true
      input:
        action_entities:
          name: Action Entities
          description: Required. The event entities to monitor for switch actions. Select the action event entity for each switch controlling these lights.
          selector:
            entity:
              domain: event
              multiple: true
        on_actions:
          name: "'on' Actions"
          description: |
            Optional. List of action values for turning on lights. Each supported action should be on its own line.

            Default:

            ```
            up_single
            on
            ```
          default: |
            up_single
            on
          selector:
            text:
              multiline: true
        off_actions:
          name: "'off' Actions"
          description: |
            Optional. List of action values for turning off lights. Each supported action should be on its own line.

            Default:

            ```
            down_single
            off
            ```
          default: |
            down_single
            off
          selector:
            text:
              multiline: true
        dim_up_actions:
          name: "'dim up' Actions"
          description: |
            Optional. List of action values for dimming up. Only used when `Primary Lights HA Control` is enabled. Each supported action should be on its own line.

            Default:

            ```
            up_hold
            ```
          default: |
            up_hold
          selector:
            text:
              multiline: true
        dim_down_actions:
          name: "'dim down' Actions"
          description: |
            Optional. List of action values for dimming down. Only used when `Primary Lights HA Control` is enabled. Each supported action should be on its own line.

            Default:

            ```
            down_hold
            ```
          default: |
            down_hold
          selector:
            text:
              multiline: true
        min_brightness_actions:
          name: "'min brightness' Actions"
          description: |
            Optional. List of action values for setting minimum brightness. Only used when `Primary Lights HA Control` is enabled. Each supported action should be on its own line.

            Default:

            ```
            down_double
            ```
          default: |
            down_double
          selector:
            text:
              multiline: true
        max_brightness_actions:
          name: "'max brightness' Actions"
          description: |
            Optional. List of action values for setting maximum brightness. Only used when `Primary Lights HA Control` is enabled. Each supported action should be on its own line.

            Default:

            ```
            up_double
            ```
          default: |
            up_double
          selector:
            text:
              multiline: true
        secondary_on_actions:
          name: "secondary 'on' Actions"
          description: |
            Optional. List of action values for turning on secondary lights. Each supported action should be on its own line.

            Default:

            ```
            up_triple
            ```
          default: |
            up_triple
          selector:
            text:
              multiline: true
        secondary_off_actions:
          name: "secondary 'off' Actions"
          description: |
            Optional. List of action values for turning off secondary lights. Each supported action should be on its own line.

            Default:

            ```
            down_triple
            ```
          default: |
            down_triple
          selector:
            text:
              multiline: true
        led_notification_script:
          name: LED Notification Script
          description: Optional. Script for setting LED notifications on switches. When specified, an LED effect is applied to the light entities automatically detected from the selected Action Entities when secondary lights are toggled.
          default: {}
          selector:
            entity:
              filter:
                domain: script
    primary_lights:
      name: Primary Light Selection
      icon: mdi:lamps
      description: The lights this automation manages, and how they are controlled.
      collapsed: false
      input:
        primary_lights:
          name: Primary Lights
          description: Required. The primary lights to control.
          selector:
            target:
              entity:
                domain: light
        primary_lights_ha_control:
          name: Primary Lights HA Control
          description: Optional. Set to `true` when Home Assistant should control the selected lights via `light_on` and `light_off` actions. This should be `false` when lights and switches are bound (Zigbee) or associated (ZWave) directly. Defaults to `false`.
          default: false
          selector:
            boolean:
        primary_lights_max_brightness:
          name: Primary Lights Maximum Brightness (HA Control)
          description: Optional. Set to maximum desired brightness level for primary lights when `max_brightness_actions` is specified. Only applies when `primary_lights_ha_control` is `true`. Defaults to 100%.
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: '%'
        primary_lights_min_brightness:
          name: Primary Lights Minimum Brightness (HA Control)
          description: Optional. Set to minimum desired brightness level for primary lights when `min_brightness_actions` is specified. Only applies when `primary_lights_ha_control` is `true`. Defaults to 35%.
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: '%'
        primary_lights_dim_step_pct:
          name: Primary Lights Dim Step Percentage (HA Control)
          description: Optional. Set to the percentage to dim the primary lights when `dim_up_actions` or `dim_down_actions` is specified. Only applies when `primary_lights_ha_control` is `true`. Defaults to 5%.
          default: 5
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: '%'
    secondary_lights:
      name: Secondary Light Selection (Optional)
      icon: mdi:lamp
      description: Optional secondary lights toggled independently from primary lights.
      collapsed: true
      input:
        secondary_lights:
          name: Secondary lights
          description: Optional. The secondary lights to toggle with dedicated switch actions. HA control of secondary lights is assumed.
          default: []
          selector:
            target:
              entity:
                domain: light
    adaptive_lighting:
      name: Adaptive Lighting (Optional)
      icon: mdi:sun-clock
      description: Options for the Adaptive Lighting integration.
      collapsed: true
      input:
        primary_adaptive_lighting_switches:
          name: Primary Adaptive Lighting Switches
          description: Optional. Adaptive Lighting switches for primary lights. Specifying switches here ensures Adaptive Lighting is reset appropriately. Choose the main on/off switch, not the brightness, color, or sleep mode sub-switches.
          default:
          selector:
            target:
              entity:
                domain: switch
                integration: adaptive_lighting
        secondary_adaptive_lighting_switches:
          name: Secondary Adaptive Lighting Switches
          description: Optional. Adaptive Lighting switches for secondary lights. Specifying switches here ensures Adaptive Lighting is reset appropriately. Choose the main on/off switch, not the brightness, color, or sleep mode sub-switches.
          default:
          selector:
            target:
              entity:
                domain: switch
                integration: adaptive_lighting
        color_phases:
          name: Color Phases
          description: |
            Optional. List of phases during which Adaptive Lighting's color mode is activated. Non-functional unless `phase_helper` is set.

            Default:

            ```
            Bedtime
            Night
            ```
          default: |
            Bedtime
            Night
          selector:
            text:
              multiline: true
        sleep_modes:
          name: Sleep Modes
          description: |
            Optional. List of modes during which Adaptive Lighting's sleep mode is activated. Non-functional unless `mode_helper` is set.

            Default:

            ```
            Sleep
            ```
          default: |
            Sleep
          selector:
            text:
              multiline: true
    home_assistant:
      name: Home Assistant Configuration (Optional)
      icon: mdi:home-assistant
      description: Input helpers that drive lighting behavior and scene overrides.
      collapsed: true
      input:
        phase_helper:
          name: Phase helper
          description: Optional. Input select tracking the current time-of-day phase. Non-functional unless `color_phases` is set.
          default: {}
          selector:
            entity:
              filter:
                domain: input_select
        mode_helper:
          name: Mode helper
          description: Optional. Input select tracking the current room mode. Non-functional unless `sleep_modes` is set.
          default: {}
          selector:
            entity:
              filter:
                domain: input_select
        sleep_mode_additional_lights:
          name: Additional sleep mode lights
          description: Optional. Lights in addition to primary lights for which sleep mode is activated. Note- secondary lights are not included by default.
          default: []
          selector:
            entity:
              filter:
                domain: light
              multiple: true
        scene_helper:
          name: Scene Helper
          description: Optional. Helper that holds a scene to set. When helper has no value, lights behave normally, but when helper has a value, that scene is applied instead. Scene helper updates apply immediately if light is on.
          default: {}
          selector:
            entity:
              filter:
                domain: input_text
mode: restart
trigger:
  - alias: action entity state change
    id: action_entity
    platform: state
    entity_id: !input action_entities
    not_from: unavailable
    not_to: unavailable
  - alias: scene_helper updated
    id: scene_helper_updated
    trigger: state
    entity_id: !input scene_helper
  - alias: mode_helper updated
    id: mode_helper_updated
    trigger: state
    entity_id: !input mode_helper
  - alias: phase_helper updated
    id: phase_helper_updated
    trigger: state
    entity_id: !input phase_helper
  - alias: automations_reloaded
    id: automations_reloaded
    platform: event
    event_type: automation_reloaded
variables:
  action: >
    {%- set action = '' -%}
    {%- if trigger is defined and trigger.to_state is defined -%}
      {%- set action = trigger.to_state.attributes.get('event_type', '') -%}
    {%- endif -%}
    {{ action }}
  on_actions: !input on_actions
  on_actions_list: "{{ on_actions.strip().split('\n') }}"
  off_actions: !input off_actions
  off_actions_list: "{{ off_actions.strip().split('\n') }}"
  dim_up_actions: !input dim_up_actions
  dim_up_actions_list: "{{ dim_up_actions.strip().split('\n') }}"
  dim_down_actions: !input dim_down_actions
  dim_down_actions_list: "{{ dim_down_actions.strip().split('\n') }}"
  min_brightness_actions: !input min_brightness_actions
  min_brightness_actions_list: "{{ min_brightness_actions.strip().split('\n') }}"
  max_brightness_actions: !input max_brightness_actions
  max_brightness_actions_list: "{{ max_brightness_actions.strip().split('\n') }}"
  secondary_on_actions: !input secondary_on_actions
  secondary_on_actions_list: "{{ secondary_on_actions.strip().split('\n') }}"
  secondary_off_actions: !input secondary_off_actions
  secondary_off_actions_list: "{{ secondary_off_actions.strip().split('\n') }}"
  action_entities: !input action_entities
  switch_light_entities: >
    {%- set ns = namespace(entities=[]) %}
    {%- for entity in action_entities %}
      {%- set lights = device_entities(device_id(entity))
                       | select('match', '^light\\.') | list %}
      {%- if lights | length > 0 %}
        {%- set ns.entities = ns.entities + [lights[0]] %}
      {%- endif %}
    {%- endfor %}
    {{ ns.entities }}
  primary_lights: !input primary_lights
  primary_lights_state: >
    {%- set primary_lights_state = 'off' %}
    {%- if primary_lights.entity_id is defined and (primary_lights | length > 0) %}
      {%- set primary_lights_states = expand(primary_lights.entity_id) | selectattr('state') | map(attribute='state') | join(',') %}
      {%- if 'on' in primary_lights_states %}
        {%- set primary_lights_state = 'on' %}
      {%- endif %}
    {%- endif %}
    {{ primary_lights_state }}
  primary_lights_ha_control: !input primary_lights_ha_control
  primary_lights_max_brightness: !input primary_lights_max_brightness
  primary_lights_min_brightness: !input primary_lights_min_brightness
  primary_lights_dim_step_pct: !input primary_lights_dim_step_pct
  primary_lights_adaptive_lighting_switches: !input primary_adaptive_lighting_switches
  secondary_lights: !input secondary_lights
  secondary_lights_adaptive_lighting_switches: !input secondary_adaptive_lighting_switches
  secondary_lights_switch_led_color: Cyan
  secondary_lights_switch_led_effect_on: Medium Rising
  secondary_lights_switch_led_effect_off: Medium Falling
  secondary_lights_switch_led_duration: 1 Second
  secondary_lights_switch_led_level: 12
  phase_helper: !input phase_helper
  color_phases: !input color_phases
  color_phases_list: "{{ (color_phases.strip() | lower).split('\n') }}"
  current_phase: >
    {%- set current_phase = '' %}
    {%- if phase_helper is defined and (phase_helper | length > 0) %}
      {%- set current_phase = states(phase_helper) | lower %}
    {%- endif %}
    {{ current_phase }}
  enable_rgb_color: >
    {%- set enable_color = false %}
    {%- if color_phases is defined and (color_phases | length > 0) %}
      {%- if current_phase in color_phases_list %}
        {%- set enable_color = true %}
      {%- endif %}
    {%- endif %}
    {{ enable_color }}
  mode_helper: !input mode_helper
  sleep_modes: !input sleep_modes
  sleep_modes_list: "{{ (sleep_modes.strip() | lower).split('\n') }}"
  sleep_mode_additional_lights: !input sleep_mode_additional_lights
  # TODO: `sleep_mode_switches` should be updated to use the adaptive_lighting switch entities instead of lights to generate sleep switch list
  sleep_mode_switches: >
    {%- set data = namespace(switches=[]) %}
    {%- set lights_list = [primary_lights.entity_id] if primary_lights.entity_id is sequence else [primary_lights.entity_id] %}
    {%- if  sleep_mode_additional_lights is defined %}
      {%- for light in lights_list + sleep_mode_additional_lights %}
        {%- set data.switches = data.switches + ['switch.adaptive_lighting_sleep_mode_' + light.replace('light.','')] %}
      {%- endfor %}
    {%- endif %}
    {{ data.switches }}
  current_mode: >
    {%- set current_mode = '' %}
    {%- if mode_helper is defined and (mode_helper | length > 0) %}
      {%- set current_mode = states(mode_helper) | lower %}
    {%- endif %}
    {{ current_mode }}
  enable_sleep: >
    {%- set enable_sleep = false %}
    {%- if sleep_modes is defined and (sleep_modes | length > 0) %}
      {%- if current_mode in sleep_modes_list %}
        {%- set enable_sleep = true %}
      {%- endif %}
    {%- endif %}
    {{ enable_sleep }}
  led_notification_script: !input led_notification_script
  scene_helper: !input scene_helper
  scene_helper_value: >
    {%- set scene = None -%}
    {%- if scene_helper is defined and (scene_helper | length > 0) %}
      {%- if states(scene_helper).startswith('scene.') and (states(scene_helper) in (states.scene | map(attribute='entity_id') | list)) %}
        {%- set scene = states(scene_helper) | lower -%}
      {%- endif -%}
    {%- endif -%}
    {{ scene }}
condition: []
action:
  - choose:
      - alias: action is in on_actions or scene_helper updated
        conditions:
          - condition: template
            value_template: "{{ (action in on_actions_list) or ((primary_lights_state == 'on') and (trigger.id in ['scene_helper_updated'])) }}"
        sequence:
          - choose:
              - alias: scene_helper is specified
                conditions:
                  - condition: template
                    value_template: "{{ scene_helper_value is not none }}"
                sequence:
                  - action: adaptive_lighting.set_manual_control
                    data:
                      manual_control: true
                      lights:
                        "{{ primary_lights.entity_id }}"
                  - action: scene.turn_on
                    target:
                      entity_id: "{{ scene_helper_value }}"
                    data:
                      transition: 1
            default:
              - action: switch.turn_off
                target:
                  "{{ primary_lights_adaptive_lighting_switches }}"
              - action: switch.turn_on
                target:
                  "{{ primary_lights_adaptive_lighting_switches }}"
      - alias: action is in off_actions
        conditions: "{{ action in off_actions_list }}"
        sequence:
          # TODO: Revisit this flow to see if this could be better optimized
          - action: adaptive_lighting.set_manual_control
            data:
              manual_control: true
              lights:
                "{{ primary_lights.entity_id }}"
          - action: switch.turn_off
            target:
              "{{ primary_lights_adaptive_lighting_switches }}"
          - action: light.turn_off
            target:
              "{{ primary_lights }}"
          - wait_template: >
              {% set lights_off = primary_lights.entity_id | map('states') | select('equalto', 'off') | list %}
              {{ lights_off | length == primary_lights.entity_id | length }}
            timeout: '00:00:10'
          - action: switch.turn_on
            target:
              "{{ primary_lights_adaptive_lighting_switches }}"
        # TODO: Revisit this flow to see if this could be better optimized and iterated for non-native switches
      - alias: action is in dim_up_actions
        conditions: "{{ action in dim_up_actions_list }}"
        sequence:
          - action: adaptive_lighting.set_manual_control
            data:
              manual_control: true
              lights:
                "{{ primary_lights.entity_id }}"
          - if:
              - condition: template
                value_template: "{{ primary_lights_ha_control == true }}"
            then:
              - action: light.turn_on
                target:
                  "{{ primary_lights }}"
                data:
                  brightness_step_pct: "{{ primary_lights_dim_step_pct }}"
        # TODO: Revisit this flow to see if this could be better optimized and iterated for non-native switches
      - alias: action is in dim_down_actions
        conditions: "{{ action in dim_down_actions_list }}"
        sequence:
          - action: adaptive_lighting.set_manual_control
            data:
              manual_control: true
              lights:
                "{{ primary_lights.entity_id }}"
          - if:
              - condition: template
                value_template: "{{ primary_lights_ha_control == true }}"
            then:
              - action: light.turn_on
                target:
                    "{{ primary_lights }}"
                data:
                  brightness_step_pct: "-{{ primary_lights_dim_step_pct }}"
        # TODO: Revisit this flow to see if this could be better optimized
      - alias: action is in max_brightness_actions
        conditions: "{{ action in max_brightness_actions_list }}"
        sequence:
          - action: adaptive_lighting.set_manual_control
            data:
              manual_control: true
              lights:
                "{{ primary_lights.entity_id }}"
          - if:
              - condition: template
                value_template: "{{ primary_lights_ha_control == true }}"
            then:
              - action: light.turn_on
                target:
                  "{{ primary_lights }}"
                data:
                  brightness_pct: "{{ primary_lights_max_brightness }}"
        # TODO: Revisit this flow to see if this could be better optimized
      - alias: action is in min_brightness_actions
        conditions: "{{ action in min_brightness_actions_list }}"
        sequence:
          - action: adaptive_lighting.set_manual_control
            data:
              manual_control: true
              lights:
                "{{ primary_lights.entity_id }}"
          - if:
              - condition: template
                value_template: "{{ primary_lights_ha_control == true }}"
            then:
              - action: light.turn_on
                target:
                  "{{ primary_lights }}"
                data:
                  brightness_pct: "{{ primary_lights_min_brightness }}"
        # TODO: Move all unnecessary actions to a separate automation
      - alias: action is in secondary_on_actions
        conditions: "{{ action in secondary_on_actions_list and ((secondary_lights.entity_id is defined) and (secondary_lights.entity_id | length > 0)) }}"
        sequence:
          - parallel:
              - if: "{{ (led_notification_script) is defined and (led_notification_script | length > 0)}}"
                then:
                  - action: "{{ led_notification_script }}"
                    data:
                      led: All
                      color: "{{ secondary_lights_switch_led_color }}"
                      level: "{{ secondary_lights_switch_led_level }}"
                      effect: "{{ secondary_lights_switch_led_effect_on }}"
                      duration: "{{ secondary_lights_switch_led_duration }}"
                      target:
                        entity_id:
                          "{{ switch_light_entities }}"
              - sequence:
                  - alias: Turn on lights
                    action: adaptive_lighting.apply
                    data:
                      entity_id: "{{ secondary_lights_adaptive_lighting_switches.entity_id }}"
                      adapt_brightness: true
                      adapt_color: true
                      prefer_rgb_color: "{{ enable_rgb_color }}"
                      turn_on_lights: true
                  - action: switch.turn_off
                    target:
                        "{{ secondary_lights_adaptive_lighting_switches }}"
                  - action: switch.turn_on
                    target:
                        "{{ secondary_lights_adaptive_lighting_switches }}"
        # TODO: Move all unnecessary actions to a separate automation
      - alias: action is in secondary_off_actions
        conditions: "{{ action in secondary_off_actions_list and ((secondary_lights.entity_id is defined) and (secondary_lights.entity_id | length > 0)) }}"
        sequence:
          - parallel:
              - if: "{{ (led_notification_script) is defined and (led_notification_script | length > 0)}}"
                then:
                  - action: "{{ led_notification_script }}"
                    data:
                      led: All
                      color: "{{ secondary_lights_switch_led_color }}"
                      level: "{{ secondary_lights_switch_led_level }}"
                      effect: "{{ secondary_lights_switch_led_effect_off }}"
                      duration: "{{ secondary_lights_switch_led_duration }}"
                      target:
                        entity_id:
                          "{{ switch_light_entities }}"
              - sequence:
                  - action: switch.turn_off
                    target:
                      "{{ secondary_lights_adaptive_lighting_switches }}"
                  - action: light.turn_off
                    target:
                        "{{ secondary_lights }}"
                  - wait_template: >
                      {% set lights_off = secondary_lights.entity_id | map('states') | select('equalto', 'off') | list %}
                      {{ lights_off | length == secondary_lights.entity_id | length }}
                    timeout: '00:00:10'
                  - action: switch.turn_on
                    target:
                      "{{ secondary_lights_adaptive_lighting_switches }}"
        # TODO: I think mode and phase helpers could be removed. Maybe even automation reloaded? Could be a good opportunity to reset config...
      - alias: mode_helper_updated or phase_helper updated or automations reloaded
        conditions: "{{ trigger.id in ['mode_helper_updated', 'phase_helper_updated', 'automations_reloaded'] }}"
        sequence:
          - action: adaptive_lighting.change_switch_settings
            data:
              use_defaults: configuration
              entity_id: "{{ primary_lights_adaptive_lighting_switches.entity_id }}"
              prefer_rgb_color: "{{ enable_rgb_color }}"
          - if:
              - condition: template
                value_template: "{{ secondary_lights.entity_id is defined and (secondary_lights | length > 0) }}"
            then:
              # this will set color mode for secondary lights, but is redundant if secondary lights have
              # their own SALSA automation.
              - action: adaptive_lighting.change_switch_settings
                data:
                  use_defaults: configuration
                  entity_id: "{{ secondary_lights_adaptive_lighting_switches.entity_id }}"
                  prefer_rgb_color: "{{ enable_rgb_color }}"
          - choose:
              - conditions: "{{ enable_sleep == true }}"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id:
                        "{{ sleep_mode_switches }}"
            default:
              - action: switch.turn_off
                target:
                  entity_id:
                    "{{ sleep_mode_switches }}"
