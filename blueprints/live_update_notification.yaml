blueprint:
  name: "Live Update Notification"
  description: >
    Sends a persistent Android Live Update notification while a status-based
    entity is active (appliances, EV charging, navigation, etc.).
    Uses a chronometer (local phone countdown) for the live time display.
    Running States is a catch-all residual — any state not in Interrupted,
    Terminal, or Ignore is treated as active. Supports inclusion,
    exclusion (-prefix), and match-all (blank) modes for Running States.
    Fires a dismissable done notification on completion (or silently clears
    if the done notification is disabled).

    Sensor type reference:
      LG Washer/Dryer — remaining_time: timestamp, total_time: minutes

    All time values are normalized to minutes internally regardless of type.
  domain: automation
  input:

    # ── Section: Appliance ─────────────────────────────────────────────────
    appliance:
      name: Appliance
      icon: mdi:home-assistant
      input:
        appliance_name:
          name: Appliance Name
          description: "Display name used in notifications. E.g. Washer, Dryer, Dishwasher"
          selector:
            text:

        status_sensor:
          name: Status Sensor
          description: "Sensor reporting the appliance's current cycle state."
          selector:
            entity:
              domain: sensor

    # ── Section: Time & Progress ───────────────────────────────────────────
    time_and_progress:
      name: Time & Progress
      icon: mdi:timer-outline
      collapsed: true
      input:
        remaining_time_sensor:
          name: Remaining Time Sensor (optional)
          description: >
            Sensor reporting time remaining in the cycle.
            Leave blank if not available — progress bar will be omitted.
          default: ""
          selector:
            entity:

        remaining_time_type:
          name: Remaining Time Sensor Type
          description: >
            The data type reported by the remaining time sensor.
              timestamp — ISO datetime of predicted cycle end (LG washer/dryer)
              minutes   — integer minutes remaining
              seconds   — integer seconds remaining (LG dishwasher)
          default: "timestamp"
          selector:
            select:
              options:
                - label: "Timestamp (ISO datetime of cycle end)"
                  value: "timestamp"
                - label: "Minutes (integer)"
                  value: "minutes"
                - label: "Seconds (integer)"
                  value: "seconds"

        total_time_sensor:
          name: Total Time Sensor (optional)
          description: >
            Sensor reporting the total cycle duration.
            Leave blank if not available — progress bar will be omitted.
          default: ""
          selector:
            entity:

        total_time_type:
          name: Total Time Sensor Type
          description: >
            The data type reported by the total time sensor.
              minutes — integer minutes (LG washer/dryer, device_class: duration)
              seconds — integer seconds (LG dishwasher)
          default: "minutes"
          selector:
            select:
              options:
                - label: "Minutes (integer)"
                  value: "minutes"
                - label: "Seconds (integer)"
                  value: "seconds"

        progress_sensor:
          name: Progress Sensor (optional)
          description: >
            Sensor whose value tracks cycle progress (e.g. battery level for EV
            charging). Used to fill the progress bar when no remaining time sensor
            is available. E.g. sensor.ymir_battery_level
          default: ""
          selector:
            entity:

        progress_max_sensor:
          name: Progress Target Sensor (optional)
          description: >
            Sensor or number entity for the target/maximum value of the progress
            sensor (e.g. charge limit). Leave blank to use 100.
            E.g. number.ymir_charge_limit
          default: ""
          selector:
            entity:

    # ── Section: State Buckets ─────────────────────────────────────────────
    state_buckets:
      name: State Buckets
      icon: mdi:state-machine
      input:
        states_running:
          name: Running States
          description: >
            Catch-all for active states. Any state not in Interrupted, Terminal,
            or Transient is treated as active regardless of this setting.
            Three modes:
              Inclusion  — list values to match. E.g. Running, Active, Washing
              Exclusion  — prefix values with '-' to exclude specific states.
                           E.g. -unknown, -unavailable
              Match-all  — leave blank to match any remaining state.
                           Useful for sensors with many unpredictable values (e.g. nav).
          default: "Running"
          selector:
            text:

        states_interrupted:
          name: Interrupted States
          description: >
            Comma-separated status values meaning the cycle is paused or
            interrupted. Notification stays persistent.
            E.g. Paused, Stopped, Door Open
          default: "Paused, Stopped"
          selector:
            text:

        states_terminal:
          name: Terminal States
          description: >
            Comma-separated status values meaning the cycle is done or the
            appliance is off/idle. Triggers the done notification (if enabled)
            or silently clears it.
            E.g. End, Finished, Complete, Off, Standby, Idle
          default: "End, Finished, Complete, Off, Standby, Idle"
          selector:
            text:

        states_ignore:
          name: Ignore States
          description: >
            Comma-separated status values that should be ignored for
            notification purposes. Transitions *from* an ignore state will not
            re-fire the done notification (e.g. "Offline" between two
            "Finished" states on a 3D printer). Transitions *to* an ignore
            state will not dismiss the notification. Leave blank if not
            applicable. E.g. Offline, Connecting
          default: ""
          selector:
            text:

    # ── Section: Notification Targets ─────────────────────────────────────
    notification_targets:
      name: Notification Targets
      icon: mdi:cellphone
      input:
        notify_targets:
          name: Notify Targets
          description: >
            Comma-separated notify service names.
            E.g. notify.mobile_app_pixel_fold, notify.mobile_app_pixel_8
          default: ""
          selector:
            text:

        notify_targets_helper:
          name: Notify Targets Helper (optional)
          description: >
            An input_text helper whose value is a comma-separated list of notify
            service names. When set, overrides Notify Targets above — update the
            helper once and all automations using it pick up the change.
            E.g. input_text.family_notify_targets
          default: ""
          selector:
            entity:

    # ── Section: Notification Behavior ────────────────────────────────────
    notification_behavior:
      name: Notification Behavior
      icon: mdi:bell-outline
      input:
        alert_on_state_change:
          name: Alert on Every Active State Change
          description: >
            When enabled, the notification alerts (sound/vibration) each time the
            status changes within the active state. When disabled (default), only
            the initial notification creation alerts — mid-cycle state changes
            update silently. Disable for entities with frequent unpredictable state
            changes (e.g. navigation sensors).
          default: false
          selector:
            boolean:

        done_notification_enabled:
          name: Enable Done Notification
          description: >
            Send a dismissable notification when a terminal state is reached.
            When disabled the notification clears silently instead.
          default: true
          selector:
            boolean:

        done_message:
          name: Done Notification Message
          description: "Message body for the cycle complete notification."
          default: "Cycle complete!"
          selector:
            text:

    # ── Section: Appearance ────────────────────────────────────────────────
    appearance:
      name: Appearance
      icon: mdi:palette-outline
      collapsed: true
      input:
        notification_icon:
          name: Notification Icon (optional)
          description: >
            MDI icon shown on the notification. E.g. mdi:tumble-dryer, mdi:washing-machine
            Leave blank to use the default Home Assistant icon.
          default: ""
          selector:
            text:

        notification_url:
          name: Notification Navigation URL (optional)
          description: >
            URL or Lovelace path to navigate to when the notification is tapped.
            E.g. /lovelace/laundry or https://example.com
            Leave blank for default app-open behavior.
          default: ""
          selector:
            text:

        notification_image:
          name: Notification Image (optional)
          description: >
            Image to attach to notifications. Accepts a camera entity
            (camera.my_cam), an image entity (image.my_preview), or a direct URL.
            Live update images are shown when first posted and may not refresh on
            every update (Android limitation).
          default: ""
          selector:
            text:

# ── Automation ─────────────────────────────────────────────────────────────
mode: queued
max: 2
max_exceeded: silent

trigger:
  - platform: homeassistant
    event: start
    id: ha_restarted

  - platform: state
    entity_id: !input status_sensor
    id: status_changed

  - platform: time_pattern
    minutes: "/1"
    id: time_updated

variables:
  # Capture blueprint inputs for use in templates
  _remaining_sensor:    !input remaining_time_sensor
  _remaining_type:      !input remaining_time_type
  _total_sensor:        !input total_time_sensor
  _total_type:          !input total_time_type
  _alert_on_state_change: !input alert_on_state_change
  _done_enabled:          !input done_notification_enabled
  _status_sensor:       !input status_sensor
  _states_running:      !input states_running
  _states_interrupted:  !input states_interrupted
  _states_terminal:     !input states_terminal
  _states_ignore:       !input states_ignore
  _notify_targets:      !input notify_targets
  _notify_helper:       !input notify_targets_helper
  _appliance_name:      !input appliance_name
  _notification_tag:    "{{ _appliance_name | lower | trim | replace(' ', '_') }}_notification"
  _done_message:        !input done_message
  _notification_icon:   !input notification_icon
  _notification_url:    !input notification_url
  _notification_image:  !input notification_image
  _progress_sensor:     !input progress_sensor
  _progress_max_sensor: !input progress_max_sensor
  _image_url: >
    {% if _notification_image == '' %}
      {{ '' }}
    {% elif _notification_image.startswith('camera.') %}
      {{ '/api/camera_proxy/' + _notification_image }}
    {% elif _notification_image.startswith('image.') %}
      {{ '/api/image_proxy/' + _notification_image }}
    {% elif _notification_image.startswith('http') or _notification_image.startswith('/') %}
      {{ _notification_image }}
    {% else %}
      {{ states(_notification_image) }}
    {% endif %}

  # ── State bucket lists ──────────────────────────────────────────────────
  # Entries prefixed with '-' switch a bucket to exclusion mode.
  # Boolean helpers (in_X_state) apply the correct mode per bucket.
  # Running is the residual catch-all — defined last so specific buckets
  # are evaluated first and can exclude themselves from running.
  running_states: >
    {% if _states_running | length == 0 %}{{ [] }}
    {% else %}{{ _states_running.split(',') | map('trim') | map('lower') | reject('match','^-') | reject('eq','') | list }}
    {% endif %}
  running_states_neg: >
    {% if _states_running | length == 0 %}{{ [] }}
    {% else %}
      {% set ns = namespace(r=[]) %}
      {% for s in _states_running.split(',') | map('trim') | map('lower') | select('match','^-') %}
        {% set ns.r = ns.r + [s | regex_replace('^-','')] %}
      {% endfor %}
      {{ ns.r }}
    {% endif %}
  interrupted_states: >
    {{ (_states_interrupted | default('Paused, Stopped')).split(',') | map('trim') | map('lower') | reject('match','^-') | reject('eq','') | list }}
  interrupted_states_neg: >
    {% set ns = namespace(r=[]) %}
    {% for s in (_states_interrupted | default('Paused, Stopped')).split(',') | map('trim') | map('lower') | select('match','^-') %}
      {% set ns.r = ns.r + [s | regex_replace('^-','')] %}
    {% endfor %}
    {{ ns.r }}
  terminal_states: >
    {{ (_states_terminal | default('End, Finished, Complete, Off, Standby, Idle')).split(',') | map('trim') | map('lower') | reject('match','^-') | reject('eq','') | list }}
  terminal_states_neg: >
    {% set ns = namespace(r=[]) %}
    {% for s in (_states_terminal | default('End, Finished, Complete, Off, Standby, Idle')).split(',') | map('trim') | map('lower') | select('match','^-') %}
      {% set ns.r = ns.r + [s | regex_replace('^-','')] %}
    {% endfor %}
    {{ ns.r }}
  ignore_states: >
    {{ (_states_ignore | default('')).split(',') | map('trim') | map('lower') | reject('match','^-') | reject('eq','') | list }}
  ignore_states_neg: >
    {% set ns = namespace(r=[]) %}
    {% for s in (_states_ignore | default('')).split(',') | map('trim') | map('lower') | select('match','^-') %}
      {% set ns.r = ns.r + [s | regex_replace('^-','')] %}
    {% endfor %}
    {{ ns.r }}

  current_status: "{{ states(_status_sensor) | lower }}"

  # True only when the status sensor itself triggered; False for time-sensor updates
  status_changed: >
    {{ 'to_state' in trigger
       and trigger.to_state is not none
       and trigger.to_state.entity_id == _status_sensor }}

  # The previous state value, lowercased; empty string when not a status-change trigger
  from_status: >
    {{ trigger.from_state.state | lower
       if status_changed and 'from_state' in trigger and trigger.from_state is not none
       else '' }}

  # ── Bucket membership helpers ──────────────────────────────────────────
  # Specific buckets are evaluated first; in_running_state excludes them so
  # running is always the true residual catch-all.
  in_interrupted_state: >
    {{ (interrupted_states | length > 0 and current_status in interrupted_states)
       or (interrupted_states | length == 0 and interrupted_states_neg | length > 0
           and current_status not in interrupted_states_neg
           and current_status not in ['unknown','unavailable']) }}
  in_terminal_state: >
    {{ (terminal_states | length > 0 and current_status in terminal_states)
       or (terminal_states | length == 0 and terminal_states_neg | length > 0
           and current_status not in terminal_states_neg
           and current_status not in ['unknown','unavailable']) }}
  in_ignore_state: >
    {{ (ignore_states | length > 0 and current_status in ignore_states)
       or (ignore_states | length == 0 and ignore_states_neg | length > 0
           and current_status not in ignore_states_neg
           and current_status not in ['unknown','unavailable']) }}
  in_running_state: >
    {{ ((_states_running | length == 0 and current_status not in ['unknown','unavailable'])
        or (running_states | length > 0 and current_status in running_states)
        or (running_states | length == 0 and _states_running | length > 0
            and running_states_neg | length > 0
            and current_status not in running_states_neg
            and current_status not in ['unknown','unavailable']))
       and not in_interrupted_state
       and not in_terminal_state
       and not in_ignore_state }}
  in_active_state: "{{ in_running_state }}"
  from_in_interrupted: >
    {% set fs = from_status %}
    {{ (interrupted_states | length > 0 and fs in interrupted_states)
       or (interrupted_states | length == 0 and interrupted_states_neg | length > 0
           and fs not in interrupted_states_neg
           and fs not in ['unknown','unavailable']) }}
  from_in_active: >
    {% set fs = from_status %}
    {{ ((_states_running | length == 0 and fs not in ['unknown','unavailable'])
        or (running_states | length > 0 and fs in running_states)
        or (running_states | length == 0 and _states_running | length > 0
            and running_states_neg | length > 0
            and fs not in running_states_neg
            and fs not in ['unknown','unavailable']))
       and fs not in interrupted_states
       and fs not in terminal_states
       and fs not in ignore_states }}
  from_in_ignore: >
    {% set fs = from_status %}
    {{ (ignore_states | length > 0 and fs in ignore_states)
       or (ignore_states | length == 0 and ignore_states_neg | length > 0
           and fs not in ignore_states_neg
           and fs not in ['unknown','unavailable']) }}

  # ── Normalize remaining time → minutes ────────────────────────────────
  # timestamp: derive minutes from (end_ts - now)
  # minutes:   use directly
  # seconds:   divide by 60
  remaining_min: >
    {% if _remaining_sensor == '' %}
      {{ -1 }}
    {% else %}
      {% set s = states(_remaining_sensor) %}
      {% if s in ['unknown', 'unavailable', ''] %}
        {{ -1 }}
      {% elif _remaining_type == 'timestamp' %}
        {{ [((as_timestamp(s) - as_timestamp(now())) / 60) | int, 0] | max }}
      {% elif _remaining_type == 'seconds' %}
        {{ [(s | int / 60) | int, 0] | max }}
      {% else %}
        {{ s | int(-1) }}
      {% endif %}
    {% endif %}

  # ── Normalize total time → minutes ────────────────────────────────────
  total_min: >
    {% if _total_sensor == '' %}
      {{ 0 }}
    {% else %}
      {% set s = states(_total_sensor) %}
      {% if s in ['unknown', 'unavailable', ''] %}
        {{ 0 }}
      {% elif _total_type == 'seconds' %}
        {{ [(s | int / 60) | int, 0] | max }}
      {% else %}
        {{ s | int(0) }}
      {% endif %}
    {% endif %}

  has_remaining_data: "{{ remaining_min >= 0 }}"

  # ── Chronometer end epoch (absolute Unix seconds) ─────────────────────────
  # Moved before progress vars so derived-total calculation can reference it.
  # timestamp type: use the sensor value directly (already an end epoch)
  # minutes/seconds: compute end epoch from remaining_min + now
  chrono_when: >
    {% if not has_remaining_data %}
      {{ 0 }}
    {% elif _remaining_type == 'timestamp' %}
      {{ as_timestamp(states(_remaining_sensor)) | int }}
    {% else %}
      {{ (as_timestamp(now()) + remaining_min * 60) | int }}
    {% endif %}

  # ── Derive total duration from cycle start when total_time_sensor absent ──
  # status sensor's last_changed = moment the current state was entered (cycle start)
  cycle_start_ts: "{{ as_timestamp(states[_status_sensor].last_changed) | int }}"
  total_min_effective: >
    {% if total_min > 0 %}
      {{ total_min }}
    {% elif has_remaining_data and chrono_when > 0 and cycle_start_ts > 0 %}
      {{ ((chrono_when - cycle_start_ts) / 60) | int }}
    {% else %}
      0
    {% endif %}

  has_time_data: "{{ remaining_min >= 0 and total_min_effective > 0 }}"

  # ── Value-based progress (e.g. battery SoC vs charge limit) ───────────
  has_ext_progress: >
    {{ _progress_sensor != ''
       and states(_progress_sensor) not in ('unknown', 'unavailable', '') }}
  ext_progress_val: "{{ states(_progress_sensor) | float(0) if has_ext_progress else 0 }}"
  ext_progress_max: >
    {% if _progress_max_sensor != ''
          and states(_progress_max_sensor) not in ('unknown', 'unavailable', '') %}
      {{ states(_progress_max_sensor) | float(100) }}
    {% else %}
      100
    {% endif %}

  # ── Progress percentage ────────────────────────────────────────────────
  progress_pct: >
    {% if has_time_data %}
      {{ [[(((total_min_effective - remaining_min) / total_min_effective) * 100) | int, 0] | max, 100] | min }}
    {% elif has_ext_progress and ext_progress_max > 0 %}
      {{ [(ext_progress_val / ext_progress_max * 100) | int, 100] | min }}
    {% else %}
      0
    {% endif %}

  # ── Re-estimate delta → minutes ───────────────────────────────────────
  # Compare old vs new sensor value, normalised to minutes, for > 1 min check
  time_delta: >
    {% if not status_changed and 'from_state' in trigger and trigger.from_state is not none %}
      {% set from_s = trigger.from_state.state %}
      {% set to_s   = trigger.to_state.state %}
      {% if from_s in ['unknown','unavailable'] or to_s in ['unknown','unavailable'] %}
        {{ 0 }}
      {% elif _remaining_type == 'timestamp' %}
        {{ ((as_timestamp(to_s) - as_timestamp(from_s)) / 60) | abs | int }}
      {% elif _remaining_type == 'seconds' %}
        {{ ((to_s | int - from_s | int) / 60) | abs | int }}
      {% else %}
        {{ (to_s | int(0) - from_s | int(0)) | abs }}
      {% endif %}
    {% else %}
      0
    {% endif %}

  # ── Notification content ───────────────────────────────────────────────
  notify_list: >
    {% set raw = states(_notify_helper) if _notify_helper != '' else _notify_targets %}
    {{ raw.split(',') | map('trim') | reject('eq', '') | list }}

  progress_label: >
    {% if has_remaining_data %}
      Done around {{ chrono_when | timestamp_custom('%I:%M %p') }}{% if has_time_data %} · {{ progress_pct }}%{% endif %}
    {% elif has_ext_progress %}
      {{ ext_progress_val | int }}% → {{ ext_progress_max | int }}%
    {% else %}
      {{ _done_message.split()[0] }} in progress…
    {% endif %}

action:
  - choose:

    # ── CASE 0: HA restarted — refresh or clear stale notifications ─────────
    - conditions:
        - condition: template
          value_template: "{{ trigger.id == 'ha_restarted' }}"
      sequence:
        - choose:
            # Active or interrupted: silently re-post the live notification
            - conditions:
                - condition: template
                  value_template: >
                    {{ in_active_state or in_interrupted_state }}
              sequence:
                - repeat:
                    for_each: "{{ notify_list }}"
                    sequence:
                      - action: "{{ repeat.item }}"
                        data:
                          title: >
                            {% if in_interrupted_state %}
                              {{ _appliance_name }} Interrupted
                            {% else %}
                              {{ _appliance_name }} {{ states(_status_sensor) | title }}
                            {% endif %}
                          message: >
                            {% if in_interrupted_state %}
                              Cycle paused or interrupted.
                            {% else %}
                              {{ progress_label }}
                            {% endif %}
                          data:
                            tag: "{{ _notification_tag }}"
                            sticky: true
                            persistent: true
                            live_update: true
                            importance: low
                            alert_once: true
                            progress: "{{ progress_pct | int }}"
                            progress_max: 100
                            chronometer: "{{ has_remaining_data }}"
                            when: "{{ chrono_when }}"
                            notification_icon: "{{ _notification_icon }}"
                            clickAction: "{{ _notification_url }}"
                            image: "{{ _image_url }}"
            # Terminal: clear any stale notification left from before restart
            - conditions:
                - condition: template
                  value_template: >
                    {{ in_terminal_state }}
              sequence:
                - repeat:
                    for_each: "{{ notify_list }}"
                    sequence:
                      - action: "{{ repeat.item }}"
                        data:
                          message: clear_notification
                          data:
                            tag: "{{ _notification_tag }}"

    # ── CASE 1: Status changed to an active (running) state ──────────────
    - conditions:
        - condition: template
          value_template: >
            {{ status_changed and in_running_state }}
      sequence:
        - repeat:
            for_each: "{{ notify_list }}"
            sequence:
              - action: "{{ repeat.item }}"
                data:
                  title: "{{ _appliance_name }} {{ states(_status_sensor) | title }}"
                  message: "{{ progress_label }}"
                  data:
                    tag: "{{ _notification_tag }}"
                    sticky: true
                    persistent: true
                    live_update: true
                    importance: default
                    alert_once: "{{ not _alert_on_state_change }}"
                    progress: "{{ progress_pct | int }}"
                    progress_max: 100
                    chronometer: "{{ has_remaining_data }}"
                    when: "{{ chrono_when }}"
                    notification_icon: "{{ _notification_icon }}"
                    clickAction: "{{ _notification_url }}"
                    image: "{{ _image_url }}"

    # ── CASE 2: Time sensor updated while active (keep body current) ──────
    - conditions:
        - condition: template
          value_template: >
            {{ not status_changed
               and in_active_state
               and (_remaining_sensor != '' or _progress_sensor != '') }}
      sequence:
        - repeat:
            for_each: "{{ notify_list }}"
            sequence:
              - action: "{{ repeat.item }}"
                data:
                  title: "{{ _appliance_name }} {{ states(_status_sensor) | title }}"
                  message: "{{ progress_label }}"
                  data:
                    tag: "{{ _notification_tag }}"
                    sticky: true
                    persistent: true
                    live_update: true
                    importance: low
                    alert_once: true
                    progress: "{{ progress_pct | int }}"
                    progress_max: 100
                    chronometer: "{{ has_remaining_data }}"
                    when: "{{ chrono_when }}"
                    notification_icon: "{{ _notification_icon }}"
                    clickAction: "{{ _notification_url }}"
                    image: "{{ _image_url }}"

    # ── CASE 3: Cycle interrupted / paused ────────────────────────────────
    - conditions:
        - condition: template
          value_template: >
            {{ status_changed
               and in_interrupted_state
               and (from_in_active or from_in_interrupted) }}
      sequence:
        - repeat:
            for_each: "{{ notify_list }}"
            sequence:
              - action: "{{ repeat.item }}"
                data:
                  title: "{{ _appliance_name }} Interrupted"
                  message: "Cycle paused or interrupted."
                  data:
                    tag: "{{ _notification_tag }}"
                    sticky: true
                    persistent: true
                    live_update: true
                    importance: default
                    notification_icon: "{{ _notification_icon }}"
                    clickAction: "{{ _notification_url }}"
                    image: "{{ _image_url }}"

    # ── CASE 4: Terminal state (done / off / idle) ────────────────────────
    - conditions:
        - condition: template
          value_template: >
            {{ status_changed
               and in_terminal_state
               and not in_ignore_state }}
      sequence:
        - choose:
            # Done notification when enabled and not arriving from an ignore state
            - conditions:
                - condition: template
                  value_template: "{{ _done_enabled and not from_in_ignore }}"
              sequence:
                - repeat:
                    for_each: "{{ notify_list }}"
                    sequence:
                      - action: "{{ repeat.item }}"
                        data:
                          title: "✅ {{ _appliance_name }} Done!"
                          message: "{{ _done_message }}"
                          data:
                            tag: "{{ _notification_tag }}"
                            sticky: false
                            importance: default
                            notification_icon: "{{ _notification_icon }}"
                            clickAction: "{{ _notification_url }}"
                            image: "{{ _image_url }}"
          # Default: silently clear (done disabled, or arrived via ignore state)
          default:
            - repeat:
                for_each: "{{ notify_list }}"
                sequence:
                  - action: "{{ repeat.item }}"
                    data:
                      message: clear_notification
                      data:
                        tag: "{{ _notification_tag }}"
